<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body>

      <div class="card container mt-5 text-center">
  <div class="card-header">
    Ejercicio 09 - Manipulando el DOM con JavaScript
  </div>
  <div class="card-body">
    <h5 class="card-title">Cambiando el color de los elementos!</h5>
    <p class="card-text">Al pasar el cursor sobre un elemento cambiará su color: </p>

    <ul class="list-group">
    <li id="uva" class="list-group-item d-flex justify-content-between align-items-center">
        Uvas
        <span id="uva-color" class="badge text-bg-primary rounded-pill">Morado</span>
    </li>
    <li id="fresa" class="list-group-item d-flex justify-content-between align-items-center">
        Fresas
        <span id="fresa-color" class="badge text-bg-primary rounded-pill">Rosa</span>
    </li>
    <li id="arandano" class="list-group-item d-flex justify-content-between align-items-center">
        Arandanos
        <span id="arandano-color" class="badge text-bg-primary rounded-pill">Azul</span>
    </li>
</ul>

  </div>
</div>
